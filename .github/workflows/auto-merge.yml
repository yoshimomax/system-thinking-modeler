name: Auto PR and Merge to main

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Build must pass before merging
      - name: Type check and build
        run: npx tsc --noEmit && npm run build

      - name: Create PR if none exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          EXISTING=$(gh pr list --head "$BRANCH" --base main --json number -q '.[0].number')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --title "Auto: $BRANCH" \
              --body "Automated PR from \`$BRANCH\`" \
              --base main \
              --head "$BRANCH"
          fi

      - name: Merge PR into main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.ref_name }}" --merge --delete-branch=false

name: Auto Merge to main and Deploy

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write

jobs:
  build-and-merge:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for merge

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Fail fast — don't touch main if build is broken
      - name: Type check and build
        run: npx tsc --noEmit && npm run build

      # Direct git merge avoids the PR creation permission issue
      - name: Merge branch into main
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin main
          git checkout main
          git merge --no-ff "origin/${{ github.ref_name }}" \
            -m "Auto-merge: ${{ github.ref_name }}"
          git push origin main

